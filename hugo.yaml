baseURL: "https://mrhe-project.vercel.app/"
languageCode: "en-us"
title: "My Profile"

# 【关键】这里必须为空，因为你已经把 layouts 放到了根目录
theme: ""

params:
  # 1. 强制拉取远程样式，解决乱码
  useBootstrapCDN: true
  custom_css: ["https://cdn.jsdelivr.net/gh/gurusabarish/hugo-profile@master/static/css/main.css"]

  # 2. 强制开启高级深灰色背景
  theme:
    default: "dark"

  # 3. 基础文案（这里我保留了你截图里的 Isabella 内容）
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Isabella."
    subtitle: "I build things for the web"
    content: "A passionate web app developer. I tend to make use of modern web technologies to build websites that look great, feel fantastic, and function correctly."
    image: "images/hero.svg"
    button:
      name: "Resume"
      url: "resume.pdf"

  # 4. 内容模块开关（确保这里都是 true，你的 About、Experience 才会出来）
  navbar:
    enable: true
  about:
    enable: true
  experience:
    enable: true
  education:
    enable: true
  projects:
    enable: true
  contact:
    enable: true

# 【注意】如果你还有其他 exampleSite 里的内容（比如具体的 experience 列表）
# 请直接把它们接在这个文件的最末尾即可。
